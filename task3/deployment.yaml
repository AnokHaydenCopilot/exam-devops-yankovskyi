---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME-deployment
  namespace: NAMESPACE
  labels:
    app: APP_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: APP_NAME
  template:
    metadata:
      labels:
        app: APP_NAME
    spec:
      containers:
      - name: APP_NAME
        image: IMAGE_NAME:IMAGE_TAG
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: APP_NAME
  namespace: NAMESPACE
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8000
    nodePort: NODE_PORT
  selector:
    app: APP_NAME
