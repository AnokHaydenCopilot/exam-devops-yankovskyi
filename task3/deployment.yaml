---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME-deployment
  namespace: NAMESPACE
  labels:
    app: APP_NAME
    env: NAMESPACE
spec:
  replicas: 1
  selector:
    matchLabels:
      app: APP_NAME
  template:
    metadata:
      labels:
        app: APP_NAME
        env: NAMESPACE
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: APP_NAME
          image: IMAGE_NAME:IMAGE_TAG
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: APP_NAME
  namespace: NAMESPACE
  labels:
    app: APP_NAME
    env: NAMESPACE
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8000
      nodePort: NODE_PORT
      protocol: TCP
  selector:
    app: APP_NAME
