---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-app-deployment
  namespace: dev
  labels:
    app: dev-app
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-app
  template:
    metadata:
      labels:
        app: dev-app
        env: dev
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: dev-app
          image: IMAGE_NAME:dev
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dev-app
  namespace: dev
  labels:
    app: dev-app
    env: dev
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30002
      protocol: TCP
  selector:
    app: dev-app
