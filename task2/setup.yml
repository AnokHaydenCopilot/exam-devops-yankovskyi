---
- name: Setup Minikube, Docker, Kubernetes and Helm
  hosts: all
  become: yes
  vars:
    minikube_url: "https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64"
    kubectl_version: "v1.30.0"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - git
          - jq
          - socat
          - conntrack
          - software-properties-common
        state: present

    - name: Install Docker (official convenience script)
      check_mode: no   # must actually run so docker group exists for next task
      shell: |
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Add ubuntu user to docker group
      check_mode: no   # docker group won't exist during --check (Docker not installed yet)
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset SSH connection so group membership takes effect
      meta: reset_connection

    - name: Ensure Docker service is started and enabled
      check_mode: no   # Docker may not be installed yet during --check
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Install Minikube binary
      get_url:
        url: "{{ minikube_url }}"
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Install kubectl binary
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Install Helm
      shell: |
        curl -fsSL -o /tmp/get_helm.sh \
          https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod 700 /tmp/get_helm.sh
        /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    # ── Minikube must run as the non-root ubuntu user ──────────────────────
    - name: Start Minikube (docker driver)
      check_mode: no   # Minikube can't start in --check mode (Docker not installed)
      become: no
      become_user: ubuntu
      command: minikube start --driver=docker --memory=4096 --cpus=2
      register: minikube_start
      changed_when: "'Done! kubectl is now configured' in minikube_start.stdout"
      failed_when: minikube_start.rc != 0

    - name: Verify Kubernetes cluster is healthy
      check_mode: no   # Must skip during check mode (k8s not running)
      become: no
      become_user: ubuntu
      command: kubectl get nodes
      register: kube_nodes

    - name: Print cluster node status
      debug:
        msg: "{{ kube_nodes.stdout_lines }}"



