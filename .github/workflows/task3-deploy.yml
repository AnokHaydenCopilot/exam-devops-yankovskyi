name: Task 3 - Deploy Application

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - release
      server_ip:
        description: 'EC2 Public IP (leave blank to auto-read from SSM)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  AWS_REGION: eu-central-1
  SSH_SECRET_NAME: yankovskyi/ci/ssh-key
  SSM_IP_PARAM: /yankovskyi/ec2/instance_ip

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_full: ${{ steps.meta.outputs.image_full }}
      image_tag:  ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout source application
        run: git clone https://github.com/YulianSalo/devops-exam-pt2.git app-src

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="${{ env.REGISTRY }}/${LOWER_REPO}/app"

          cd app-src
          if [ "${{ github.event.inputs.target_env }}" = "dev" ]; then
            git checkout develop
            IMAGE_TAG="dev"
          else
            git checkout tags/1.0.0
            IMAGE_TAG="release"
          fi

          echo "image_full=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}"   >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: app-src
          push: true
          tags: ${{ steps.meta.outputs.image_full }}:${{ steps.meta.outputs.image_tag }}

  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Resolve target IP ─────────────────────────────────────────────────
      - name: Resolve server IP
        run: |
          set -euo pipefail
          # Priority: 1) manual input  2) SSM Parameter Store (auto-updated by Terraform)
          TARGET_IP="${{ github.event.inputs.server_ip }}"

          if [ -z "$TARGET_IP" ]; then
            echo "Fetching IP from SSM (/yankovskyi/ec2/instance_ip)..."
            TARGET_IP="$(aws ssm get-parameter \
              --name "$SSM_IP_PARAM" \
              --query 'Parameter.Value' --output text)"
          fi

          if [ -z "$TARGET_IP" ] || [ "$TARGET_IP" = "None" ]; then
            echo "ERROR: Could not resolve instance IP. Run Task 1 first."
            exit 1
          fi

          echo "TARGET_IP=${TARGET_IP}" >> "$GITHUB_ENV"
          echo "Target server: $TARGET_IP"
      # ── SSH ───────────────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          secret_json="$(aws secretsmanager get-secret-value \
            --secret-id "$SSH_SECRET_NAME" \
            --query SecretString --output text)"
          printf '%s\n' "$secret_json" | jq -r '.private_key' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$TARGET_IP" >> ~/.ssh/known_hosts 2>/dev/null

      # ── Set per-environment config ────────────────────────────────────────
      - name: Set environment config
        run: |
          if [ "${{ github.event.inputs.target_env }}" = "dev" ]; then
            echo "HOST_PORT=8002"    >> "$GITHUB_ENV"
            echo "NODE_PORT=30002"   >> "$GITHUB_ENV"
            echo "APP_NAME=dev-app"  >> "$GITHUB_ENV"
            echo "MANIFEST=task3/deployment-dev.yaml" >> "$GITHUB_ENV"
          else
            echo "HOST_PORT=8003"       >> "$GITHUB_ENV"
            echo "NODE_PORT=30003"      >> "$GITHUB_ENV"
            echo "APP_NAME=release-app" >> "$GITHUB_ENV"
            echo "MANIFEST=task3/deployment-release.yaml" >> "$GITHUB_ENV"
          fi

      # ── Create namespace + GHCR pull secret ──────────────────────────────
      - name: Create namespace and GHCR pull secret
        run: |
          ENV="${{ github.event.inputs.target_env }}"

          ssh ubuntu@"$TARGET_IP" \
            "minikube kubectl -- create namespace ${ENV} \
             --dry-run=client -o yaml | minikube kubectl -- apply -f -"

          ssh ubuntu@"$TARGET_IP" \
            "minikube kubectl -- create secret docker-registry ghcr-secret \
               --docker-server=ghcr.io \
               --docker-username=${{ github.actor }} \
               --docker-password=${{ secrets.GITHUB_TOKEN }} \
               --namespace=${ENV} \
               --dry-run=client -o yaml \
             | minikube kubectl -- apply -f -"

      # ── Render manifest (substitute only IMAGE_NAME) ──────────────────────
      - name: Render manifest
        run: |
          IMAGE_FULL="${{ needs.build.outputs.image_full }}"
          sed "s|IMAGE_NAME|${IMAGE_FULL}|g" "$MANIFEST" > /tmp/deploy-rendered.yaml
          echo "=== Rendered manifest ==="
          cat /tmp/deploy-rendered.yaml

      # ── K8s dry-run validation ────────────────────────────────────────────
      - name: K8s dry-run validation
        run: |
          ENV="${{ github.event.inputs.target_env }}"
          scp /tmp/deploy-rendered.yaml ubuntu@"$TARGET_IP":/tmp/deploy-${ENV}.yaml
          ssh ubuntu@"$TARGET_IP" \
            "minikube kubectl -- apply -f /tmp/deploy-${ENV}.yaml --dry-run=client"

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Deploy to Kubernetes
        run: |
          ENV="${{ github.event.inputs.target_env }}"
          ssh ubuntu@"$TARGET_IP" \
            "minikube kubectl -- apply -f /tmp/deploy-${ENV}.yaml"
          ssh ubuntu@"$TARGET_IP" \
            "minikube kubectl -- rollout status deployment/${APP_NAME}-deployment \
             -n ${ENV} --timeout=180s"

      # ── Stable port-forward via socat (iptables DNAT) ────────────────────
      # kubectl port-forward dies when SSH exits. socat forwards stably:
      # EC2:HOST_PORT → minikube_ip:NODE_PORT (NodePort) — survives reboots
      - name: Setup stable port-forward via socat
        run: |
          ENV="${{ github.event.inputs.target_env }}"

          # Write the socat forwarding script to the server
          cat > /tmp/setup-socat.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail
          HOST_PORT="$1"
          NODE_PORT="$2"
          ENV="$3"

          # Get minikube cluster IP
          MINIKUBE_IP=$(minikube ip)
          echo "Minikube IP: $MINIKUBE_IP"

          # Kill existing socat on this port (idempotent)
          pkill -f "socat.*:${HOST_PORT}" || true
          sleep 1

          # Start socat as a persistent daemon:
          # Listen on all interfaces at HOST_PORT, forward to minikube NodePort
          nohup socat TCP-LISTEN:${HOST_PORT},fork,reuseaddr \
            TCP:${MINIKUBE_IP}:${NODE_PORT} \
            > /tmp/socat-${ENV}.log 2>&1 &

          echo "socat started: 0.0.0.0:${HOST_PORT} -> ${MINIKUBE_IP}:${NODE_PORT} (pid=$!)"
          SCRIPT

          scp /tmp/setup-socat.sh ubuntu@"$TARGET_IP":/tmp/setup-socat.sh
          ssh ubuntu@"$TARGET_IP" \
            "bash /tmp/setup-socat.sh '${HOST_PORT}' '${NODE_PORT}' '${ENV}'"

          sleep 5

      # ── Verify ────────────────────────────────────────────────────────────
      - name: Verify application endpoint
        run: |
          echo "Testing http://${TARGET_IP}:${HOST_PORT} ..."
          curl --fail \
               --retry 15 \
               --retry-delay 5 \
               --retry-connrefused \
               -s -o /dev/null -w "HTTP %{http_code}\n" \
               "http://${TARGET_IP}:${HOST_PORT}"
          echo "✅ Application is reachable at http://${TARGET_IP}:${HOST_PORT}"

      - name: Summary
        run: |
          {
            echo "### ✅ Task 3 — Application Deployed"
            echo "| Key | Value |"
            echo "|---|---|"
            echo "| Environment | \`${{ github.event.inputs.target_env }}\` |"
            echo "| URL | http://${TARGET_IP}:${HOST_PORT} |"
            echo "| Image | \`${{ needs.build.outputs.image_full }}:${{ needs.build.outputs.image_tag }}\` |"
            echo ""
            echo "#### Quick test:"
            echo "\`\`\`"
            echo "curl http://${TARGET_IP}:${HOST_PORT}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
