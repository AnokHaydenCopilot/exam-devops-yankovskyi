name: Task 3 - Deploy App

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Environment to deploy (dev/release)'
        required: true
        options:
          - dev
          - release

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/app
  KUBE_HOST: ${{ secrets.KUBE_HOST }} # VM public IP

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Source Repo
        run: git clone https://github.com/YulianSalo/devops-exam-pt2.git app-src

      - name: Determine Branch/Tag
        id: branch
        run: |
          cd app-src
          if [ "${{ github.event.inputs.target_env }}" == "dev" ]; then
            git checkout develop
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "node_port=30002" >> $GITHUB_OUTPUT
          else
            git checkout tags/1.0.0
            echo "tag=release" >> $GITHUB_OUTPUT
            echo "node_port=30003" >> $GITHUB_OUTPUT
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: app-src
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}

    outputs:
      image_tag: ${{ steps.branch.outputs.tag }}
      node_port: ${{ steps.branch.outputs.node_port }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.KUBE_HOST }} >> ~/.ssh/known_hosts

      - name: Setup Kube Namespace
        run: |
           ssh ubuntu@${{ secrets.KUBE_HOST }} "minikube kubectl -- create namespace ${{ github.event.inputs.target_env }} --dry-run=client -o yaml | minikube kubectl -- apply -f -"

      - name: Deploy application
        run: |
          # Copy deployment spec
          cp task3/deployment.yaml task3/deploy.yaml
          
          # Replace variables
          sed -i "s/NAMESPACE/${{ github.event.inputs.target_env }}/g" task3/deploy.yaml
          sed -i "s/APP_NAME/${{ github.event.inputs.target_env }}-app/g" task3/deploy.yaml
          sed -i "s|IMAGE_NAME|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}|g" task3/deploy.yaml
          sed -i "s/IMAGE_TAG/${{ needs.build.outputs.image_tag }}/g" task3/deploy.yaml
          sed -i "s/NODE_PORT/${{ needs.build.outputs.node_port }}/g" task3/deploy.yaml

          # Copy to EC2 and deploy via minikube
          scp task3/deploy.yaml ubuntu@${{ secrets.KUBE_HOST }}:/home/ubuntu/
          
          # K8s Dry-run validation
          ssh ubuntu@${{ secrets.KUBE_HOST }} "minikube kubectl -- apply -f /home/ubuntu/deploy.yaml --dry-run=client"

          # Actual K8s Deploy
          ssh ubuntu@${{ secrets.KUBE_HOST }} "minikube kubectl -- apply -f /home/ubuntu/deploy.yaml"

          # Forward ports using nohup
          if [ "${{ github.event.inputs.target_env }}" == "dev" ]; then
             ssh ubuntu@${{ secrets.KUBE_HOST }} "nohup minikube kubectl -- port-forward --address 0.0.0.0 svc/${{ github.event.inputs.target_env }}-app 8002:80 -n ${{ github.event.inputs.target_env }} > /dev/null 2>&1 &"
          else
             ssh ubuntu@${{ secrets.KUBE_HOST }} "nohup minikube kubectl -- port-forward --address 0.0.0.0 svc/${{ github.event.inputs.target_env }}-app 8003:80 -n ${{ github.event.inputs.target_env }} > /dev/null 2>&1 &"
          fi
