name: Task 2 - Ansible Setup (Kubernetes Stack)

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'EC2 Public IP (leave blank to auto-read from SSM)'
        required: false
        type: string

env:
  AWS_REGION: eu-central-1
  SSH_SECRET_NAME: yankovskyi/ci/ssh-key
  SSM_IP_PARAM: /yankovskyi/ec2/instance_ip

jobs:
  ansible:
    name: Ansible — Install K8s Stack
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./task2

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Resolve target IP ───────────────────────────────────────────────
      - name: Resolve server IP
        run: |
          set -euo pipefail
          # Priority: 1) manual input  2) SSM Parameter Store (auto-updated by Terraform)
          TARGET_IP="${{ github.event.inputs.server_ip }}"

          if [ -z "$TARGET_IP" ]; then
            echo "Fetching IP from SSM (/yankovskyi/ec2/instance_ip)..."
            TARGET_IP="$(aws ssm get-parameter \
              --name "$SSM_IP_PARAM" \
              --query 'Parameter.Value' --output text)"
          fi

          if [ -z "$TARGET_IP" ] || [ "$TARGET_IP" = "None" ]; then
            echo "ERROR: Could not resolve instance IP. Run Task 1 first."
            exit 1
          fi

          echo "TARGET_IP=${TARGET_IP}" >> "$GITHUB_ENV"
          echo "Target server: $TARGET_IP"

      # ── SSH key ────────────────────────────────────────────────────────────
      - name: Load SSH private key from Secrets Manager
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          secret_json="$(aws secretsmanager get-secret-value \
            --secret-id "$SSH_SECRET_NAME" \
            --query SecretString --output text)"
          printf '%s\n' "$secret_json" | jq -r '.private_key' \
            > ~/.ssh/yankovskyi_key
          chmod 600 ~/.ssh/yankovskyi_key
          ssh-keyscan -H "$TARGET_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

      # ── Ansible ────────────────────────────────────────────────────────────
      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible jq

      - name: Generate inventory
        run: |
          sed -e "s/{{ server_ip }}/${TARGET_IP}/" \
              -e "s|{{ ssh_key_path }}|~/.ssh/yankovskyi_key|" \
              inventory.ini.tpl > inventory.ini
          echo "Generated inventory:"
          cat inventory.ini

      - name: Ansible syntax check (dry-run validation)
        run: ansible-playbook setup.yml -i inventory.ini --syntax-check

      - name: Ansible check mode (no-changes simulation)
        run: |
          ansible-playbook setup.yml -i inventory.ini --check \
            --diff || echo "Check mode completed (some tasks may report changes)"

      - name: Run Ansible playbook (install K8s stack)
        run: ansible-playbook setup.yml -i inventory.ini -v

      - name: Summary
        run: |
          {
            echo "### ✅ Task 2 — Kubernetes Stack Installed"
            echo "| Component | Status |"
            echo "|---|---|"
            echo "| Docker | ✅ |"
            echo "| Minikube | ✅ |"
            echo "| kubectl | ✅ |"
            echo "| Helm | ✅ |"
            echo ""
            echo "Target: \`${TARGET_IP}\`"
          } >> "$GITHUB_STEP_SUMMARY"
