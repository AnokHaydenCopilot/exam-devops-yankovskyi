name: Task 2 - Ansible Setup

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Target EC2 Public IP address'
        required: true
        type: string

env:
  AWS_REGION: eu-central-1
  SSH_SECRET_NAME: yankovskyi/ci/ssh-key

jobs:
  ansible:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./task2

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible jq

      - name: Load SSH Key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          secret_json="$(aws secretsmanager get-secret-value --secret-id "$SSH_SECRET_NAME" --query SecretString --output text)"
          printf '%s\n' "$secret_json" | jq -r '.private_key' > ~/.ssh/yankovskyi_key
          chmod 600 ~/.ssh/yankovskyi_key

      - name: Generate Inventory
        run: |
          cp inventory.ini.tpl inventory.ini
          sed -i "s/{{ server_ip }}/${{ github.event.inputs.server_ip }}/" inventory.ini
          sed -i "s|{{ ssh_key_path }}|~/.ssh/yankovskyi_key|" inventory.ini

      - name: Display variables for debug (Safe)
        run: |
          echo "Server IP to configure: ${{ github.event.inputs.server_ip }}"

      - name: Syntax Check
        run: |
          ansible-playbook setup.yml -i inventory.ini --syntax-check

      - name: Dry Run (Check mode)
        run: |
          ansible-playbook setup.yml -i inventory.ini --check

      - name: Run Ansible Playbook
        run: |
          ansible-playbook setup.yml -i inventory.ini
